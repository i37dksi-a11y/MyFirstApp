<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Bufale sul nastro — gioco pazzo</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: linear-gradient(160deg, #1e1b4b 0%, #312e81 40%, #4c1d95 100%);
      color: #f1f5f9;
      padding: 0.5rem 0.75rem 1rem;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    h1 {
      font-size: 1.22rem;
      margin: 0 0 0.25rem;
      text-shadow: 0 2px 12px rgba(0, 0, 0, 0.45);
    }
    p.intro {
      text-align: center;
      font-size: 0.78rem;
      color: #c4b5fd;
      max-width: 480px;
      margin: 0 0 0.45rem;
      line-height: 1.45;
    }
    #hud {
      width: 100%;
      max-width: 720px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.35rem;
      margin-bottom: 0.35rem;
      font-weight: 800;
      font-size: 0.88rem;
      text-shadow: 0 1px 4px #000;
    }
    #msg {
      flex: 1 1 100%;
      text-align: center;
      min-height: 1.4em;
      font-size: 1rem;
      color: #fde047;
    }
    #wrap {
      width: 100%;
      max-width: 720px;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.55);
      touch-action: manipulation;
    }
    canvas {
      display: block;
      width: 100%;
      height: auto;
      cursor: pointer;
      background: #0f172a;
    }
    #overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.82);
      align-items: center;
      justify-content: center;
      z-index: 30;
      padding: 1rem;
    }
    #overlay.on {
      display: flex;
    }
    #overlay .box {
      background: linear-gradient(180deg, #4338ca, #3730a3);
      border: 3px solid #fbbf24;
      border-radius: 18px;
      padding: 1.5rem;
      text-align: center;
      max-width: 340px;
    }
    #overlay button {
      margin-top: 1rem;
      padding: 0.65rem 1.5rem;
      font-weight: 800;
      border: none;
      border-radius: 12px;
      background: linear-gradient(180deg, #34d399, #059669);
      color: #fff;
      cursor: pointer;
      box-shadow: 0 4px 0 #047857;
    }
    nav {
      margin-top: 0.85rem;
      font-size: 0.82rem;
    }
    nav a {
      color: #93c5fd;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <h1>Bufale sul nastro</h1>
  <p class="intro">
    Cibo folle sul tapis roulant: <strong>tappa solo il buono</strong>, evita la roba esplosiva.
    Più combo di seguito = più punti ronzanti. <strong>Spazio</strong> = pausa.
  </p>
  <div id="hud">
    <span id="scoreEl">Punti 0</span>
    <span id="comboEl">Combo ×1</span>
    <span id="lifeEl">❤️ 3</span>
  </div>
  <div id="msg"></div>
  <div id="wrap">
    <canvas id="cv" width="720" height="440" aria-label="Bufale sul nastro"></canvas>
  </div>

  <div id="overlay">
    <div class="box">
      <h2 id="endTitle" style="margin: 0 0 0.5rem">Fine corsa!</h2>
      <p id="endScore"></p>
      <button type="button" id="btnAgain">Riprova</button>
    </div>
  </div>

  <nav><a href="entra.html">← Entra</a></nav>

  <script>
    const CV_W = 720;
    const CV_H = 440;
    const BELT_Y = 268;
    const BELT_H = 112;
    const STRIKE_X0 = CV_W * 0.34;
    const STRIKE_X1 = CV_W * 0.66;

    let items = [];
    let score = 0;
    let combo = 1;
    let lives = 3;
    let spawnAcc = 0;
    let difficulty = 1;
    let tick = 0;
    let running = true;
    let paused = false;
    let msgT = 0;
    let msgText = "";
    let audioCtx = null;

    const TYPES = [
      { id: "cake", emoji: "🍰", good: true, pts: 12 },
      { id: "pizza", emoji: "🍕", good: true, pts: 10 },
      { id: "burger", emoji: "🍔", good: true, pts: 11 },
      { id: "taco", emoji: "🌮", good: true, pts: 9 },
      { id: "duck", emoji: "🦆", good: true, pts: 55 },
      { id: "broccoli", emoji: "🥦", good: true, pts: 4 },
      { id: "bomb", emoji: "🧨", good: false, pts: 0 },
      { id: "skull", emoji: "💀", good: false, pts: 0 },
    ];

    const TAUNTS = [
      "Chef supremo!",
      "Da urlo!",
      "Il nastro ti teme!",
      "Mitico!",
      "Continua così!",
      "Che riflessi!",
      "Leggenda del buffet!",
    ];

    function ensureAudio() {
      if (audioCtx) return;
      try {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      } catch (_) {}
    }

    function beep(freq, t, vol = 0.08) {
      ensureAudio();
      if (!audioCtx) return;
      try {
        audioCtx.resume();
      } catch (_) {}
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.type = "square";
      o.frequency.value = freq;
      const t0 = audioCtx.currentTime;
      g.gain.setValueAtTime(0.0001, t0);
      g.gain.linearRampToValueAtTime(vol, t0 + 0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, t0 + t);
      o.connect(g);
      g.connect(audioCtx.destination);
      o.start(t0);
      o.stop(t0 + t + 0.02);
    }

    function sfxGood() {
      beep(523, 0.06, 0.06);
      window.setTimeout(() => beep(784, 0.07, 0.05), 45);
    }

    function sfxBad() {
      beep(120, 0.22, 0.09);
      window.setTimeout(() => beep(90, 0.18, 0.07), 60);
    }

    function sfxCombo() {
      beep(659, 0.05, 0.055);
      window.setTimeout(() => beep(880, 0.06, 0.045), 55);
      window.setTimeout(() => beep(1046, 0.08, 0.04), 110);
    }

    function flashMsg(t, ms = 1400) {
      msgText = t;
      msgT = ms;
    }

    function spawnItem() {
      const roll = Math.random();
      let pool = TYPES;
      if (difficulty < 1.35 && roll > 0.78) pool = TYPES.filter((x) => x.good);
      const pick = pool[Math.floor(Math.random() * pool.length)];
      items.push({
        x: CV_W + 40,
        type: pick,
        size: 38 + Math.random() * 10,
        bob: Math.random() * Math.PI * 2,
      });
    }

    function tryHit(tx, ty) {
      if (!running || paused) return;
      if (ty < BELT_Y - 30 || ty > BELT_Y + BELT_H + 20) {
        flashMsg("Più in basso, sul nastro!");
        return;
      }

      let best = null;
      let bestD = 9999;
      for (const it of items) {
        if (it.x < STRIKE_X0 - 80 || it.x > STRIKE_X1 + 80) continue;
        const cx = it.x;
        const cy = BELT_Y + BELT_H * 0.42 + Math.sin(tick * 0.05 + it.bob) * 6;
        const d = Math.hypot(tx - cx, ty - cy);
        if (d < bestD && d < 52) {
          bestD = d;
          best = it;
        }
      }

      if (!best) {
        flashMsg("Niente da prendere…");
        return;
      }

      const t = best.type;
      if (t.good) {
        const pts = Math.floor(t.pts * combo * (0.85 + difficulty * 0.08));
        score += pts;
        combo = Math.min(12, combo + 1);
        sfxGood();
        if (combo >= 4 && combo % 2 === 0) sfxCombo();
        flashMsg("+" + pts + "  ·  " + (TAUNTS[Math.floor(Math.random() * TAUNTS.length)] || "Bella!"));
        if (t.id === "duck") flashMsg("ANATRA D’ORO! +" + pts, 1800);
      } else {
        combo = 1;
        lives -= 1;
        sfxBad();
        flashMsg("Uffa! Combo azzerata.");
        if (lives <= 0) gameOver();
      }

      items = items.filter((x) => x !== best);
      updateHud();
    }

    function updateHud() {
      document.getElementById("scoreEl").textContent = "Punti " + score;
      document.getElementById("comboEl").textContent = "Combo ×" + combo;
      document.getElementById("lifeEl").textContent = "❤️ " + Math.max(0, lives);
    }

    function gameOver() {
      running = false;
      document.getElementById("endScore").innerHTML =
        "Punteggio finale: <strong>" + score + "</strong><br/>Combo max raggiunta? Gioca di nuovo!";
      document.getElementById("overlay").classList.add("on");
    }

    function resetGame() {
      items = [];
      score = 0;
      combo = 1;
      lives = 3;
      spawnAcc = 0;
      difficulty = 1;
      running = true;
      paused = false;
      msgText = "";
      document.getElementById("overlay").classList.remove("on");
      updateHud();
    }

    function drawBg(ctx) {
      const g = ctx.createLinearGradient(0, 0, 0, CV_H);
      g.addColorStop(0, "#1e293b");
      g.addColorStop(1, "#0f172a");
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, CV_W, CV_H);

      ctx.fillStyle = "#334155";
      ctx.fillRect(0, BELT_Y, CV_W, BELT_H);

      ctx.strokeStyle = "rgba(251,191,36,0.5)";
      ctx.lineWidth = 3;
      ctx.setLineDash([14, 12]);
      ctx.beginPath();
      ctx.moveTo(0, BELT_Y + BELT_H * 0.72);
      ctx.lineTo(CV_W, BELT_Y + BELT_H * 0.72);
      ctx.stroke();
      ctx.setLineDash([]);

      const pulse = 0.5 + Math.sin(tick * 0.04) * 0.08;
      ctx.fillStyle = `rgba(52, 211, 153, ${0.12 + pulse * 0.08})`;
      ctx.fillRect(STRIKE_X0, BELT_Y - 8, STRIKE_X1 - STRIKE_X0, BELT_H + 16);
      ctx.strokeStyle = "rgba(52, 211, 153, 0.55)";
      ctx.lineWidth = 2;
      ctx.strokeRect(STRIKE_X0, BELT_Y - 8, STRIKE_X1 - STRIKE_X0, BELT_H + 16);

      ctx.fillStyle = "rgba(255,255,255,0.06)";
      ctx.font = "bold 13px system-ui";
      ctx.fillText("ZONA TAP · colpisci qui", STRIKE_X0 + 8, BELT_Y - 14);
    }

    function drawItems(ctx) {
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      for (const it of items) {
        const y = BELT_Y + BELT_H * 0.42 + Math.sin(tick * 0.055 + it.bob) * 7;
        ctx.font = "bold " + Math.floor(it.size) + "px system-ui";
        ctx.shadowColor = "rgba(0,0,0,0.45)";
        ctx.shadowBlur = 6;
        ctx.fillText(it.type.emoji, it.x, y);
        ctx.shadowBlur = 0;
      }
    }

    function step(dt) {
      if (!running) return;
      if (paused) return;
      tick += dt;
      if (msgT > 0) msgT -= dt;
      else msgText = "";

      const speed = (2.1 + difficulty * 0.65) * (dt / 16);
      for (const it of items) it.x -= speed;

      items = items.filter((it) => it.x > -60);

      spawnAcc += dt * (0.65 + difficulty * 0.22);
      const need = 820 - difficulty * 40;
      while (spawnAcc >= need) {
        spawnAcc -= need;
        spawnItem();
      }

      difficulty += 0.00009 * dt;
      document.getElementById("msg").textContent = msgT > 0 ? msgText : "";
    }

    let lastT = performance.now();
    function loop(now) {
      const dt = Math.min(40, now - lastT);
      lastT = now;
      step(dt);
      const canvas = document.getElementById("cv");
      const ctx = canvas.getContext("2d");
      ctx.clearRect(0, 0, CV_W, CV_H);
      drawBg(ctx);
      drawItems(ctx);
      requestAnimationFrame(loop);
    }

    const canvas = document.getElementById("cv");
    canvas.addEventListener("pointerdown", (e) => {
      e.preventDefault();
      ensureAudio();
      try {
        audioCtx.resume();
      } catch (_) {}
      const r = canvas.getBoundingClientRect();
      const sx = canvas.width / r.width;
      const sy = canvas.height / r.height;
      tryHit((e.clientX - r.left) * sx, (e.clientY - r.top) * sy);
    });

    window.addEventListener("keydown", (e) => {
      if (e.code === "Space") {
        e.preventDefault();
        paused = !paused;
        flashMsg(paused ? "Pausa" : "Via!", 600);
      }
    });

    document.getElementById("btnAgain").onclick = () => resetGame();

    updateHud();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
