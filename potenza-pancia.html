      background-clip: text;
      color: transparent;

      text-align: center;
      font-size: 0.82rem;
      color: #b8a8c8;

    #lang-wrap {

      max-width: 420px;
      margin-bottom: 0.55rem;
    }
    #lang-wrap label {
      display: block;
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #9b8aad;
      margin-bottom: 0.3rem;
    }
    #lang {
      width: 100%;
      padding: 0.6rem 0.75rem;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(0, 0, 0, 0.3);
      color: #fff;
      font-size: 0.9rem;
    }
    .badge {
      font-size: 0.72rem;
      font-weight: 800;
      padding: 0.3rem 0.65rem;
      border-radius: 999px;
      margin-bottom: 0.55rem;

      position: relative;
      width: 100%;
      max-width: 420px;
      border-radius: 20px;
      overflow: hidden;
      background: #0a0610;

        0 0 0 2px rgba(255, 212, 59, 0.25),

      width: 100%;
      aspect-ratio: 3 / 4;
      object-fit: cover;
      background: #1a1028;
    }
    #preview { display: none; }
    #overlay-ui {
      position: absolute;
      inset: 0;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

      width: 62%;
      height: 48%;
      border: 3px dashed rgba(255, 212, 59, 0.85);
      border-radius: 50%;
      box-shadow:

        inset 0 0 30px rgba(255, 107, 107, 0.25);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.9; }
      50% { transform: scale(1.03); opacity: 1; }
    }
    .guide-label {
      position: absolute;
      bottom: 14%;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 0.78rem;
      font-weight: 700;
      color: #ffe066;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.8);
    }
    #scan-line {
      position: absolute;
      left: 8%;
      right: 8%;
      height: 4px;
      background: linear-gradient(90deg, transparent, #51cf66, #ffd43b, #51cf66, transparent);
      box-shadow: 0 0 16px #51cf66;
      top: 20%;
      opacity: 0;
    }
    #scan-line.on {
      opacity: 1;
      animation: scan 1.4s ease-in-out infinite;
    }
    @keyframes scan {
      0% { top: 18%; }
      100% { top: 72%; }
    }
    .controls {
      width: 100%;
      max-width: 420px;
      display: flex;
      gap: 0.5rem;
      margin-top: 0.75rem;
      flex-wrap: wrap;
    }
    button {
      flex: 1;
      min-width: 120px;
      border: none;
      border-radius: 14px;
      padding: 0.8rem 0.9rem;
      font-weight: 800;
      font-size: 0.88rem;
      cursor: pointer;
      color: #fff;
    }
    #btn-scan {
      background: linear-gradient(180deg, #ff6b6b, #c92a2a);
      box-shadow: 0 5px 0 #862e2e;
    }
    #btn-scan:disabled {
      opacity: 0.55;
      cursor: wait;
      transform: translateY(2px);
      box-shadow: 0 3px 0 #862e2e;
    }
    #btn-flip, #btn-retry {
      background: linear-gradient(180deg, #5c7cfa, #364fc7);
      box-shadow: 0 5px 0 #243a8f;
    }
    #result {
      width: 100%;
      max-width: 420px;
      margin-top: 0.85rem;
      padding: 1rem 1.1rem;
      border-radius: 18px;
      background: linear-gradient(160deg, rgba(61, 31, 74, 0.95), rgba(18, 10, 24, 0.95));
      border: 2px solid rgba(255, 212, 59, 0.35);
      text-align: center;
      display: none;
    }
    #result.on { display: block; }
    #result.fake { border-color: rgba(255, 107, 107, 0.5); }
    #result .tag {
      display: inline-block;
      margin: 0 0 0.5rem;
      padding: 0.25rem 0.6rem;
      border-radius: 999px;
      font-size: 0.68rem;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    #result .tag.truth { background: rgba(81, 207, 102, 0.2); color: #8ce99a; }
    #result .tag.bluff { background: rgba(255, 107, 107, 0.2); color: #ffa8a8; }
    #result .rank {
      margin: 0 0 0.35rem;
      font-size: 1.05rem;
      font-weight: 800;
      color: #ffd43b;
    }
    #result .power {
      margin: 0;
      font-size: 2.4rem;
      font-weight: 900;
      letter-spacing: 0.04em;
      color: #fff;
      text-shadow: 0 0 20px rgba(255, 107, 107, 0.6);
    }
    #result .msg {
      margin: 0.55rem 0 0;
      font-size: 0.86rem;
      color: #d0bfe0;
      line-height: 1.45;
    }
    #meter {
      margin-top: 0.75rem;
      height: 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      overflow: hidden;
    }
    #meter > i {
      display: block;
      height: 100%;
      width: 0%;
      border-radius: 999px;
      background: linear-gradient(90deg, #51cf66, #ffd43b, #ff6b6b, #cc5de8);
      transition: width 0.8s ease-out;
    }
    #guest-note {

      max-width: 420px;
      margin-top: 0.75rem;
      padding: 0.85rem 1rem;
      border-radius: 14px;

      border: 1px solid rgba(255, 107, 107, 0.3);
      font-size: 0.8rem;
      color: #ffc9c9;
      line-height: 1.45;
      display: none;
    }
    #guest-note.on { display: block; }
    #paywall {

      background: linear-gradient(160deg, rgba(80, 45, 20, 0.9), rgba(30, 18, 8, 0.95));

  const langSelect = document.getElementById("lang");
  const video = document.getElementById("video");
  const preview = document.getElementById("preview");
  const ctx = preview.getContext("2d", { willReadFrequently: true });
  const scanLine = document.getElementById("scan-line");
  const btnScan = document.getElementById("btn-scan");
  const btnFlip = document.getElementById("btn-flip");
  const btnRetry = document.getElementById("btn-retry");
  const errBox = document.getElementById("err");
  const guestNote = document.getElementById("guest-note");
  const result = document.getElementById("result");
  const resultTag = document.getElementById("result-tag");
  const rankEl = document.getElementById("rank");
  const powerEl = document.getElementById("power");
  const msgEl = document.getElementById("msg");
  const meterFill = document.getElementById("meter-fill");
  const modeBadge = document.getElementById("mode-badge");
  const paywall = document.getElementById("paywall");
  const btnPay = document.getElementById("btn-pay");
  const btnPaidDone = document.getElementById("btn-paid-done");
  const freePassInput = document.getElementById("free-pass");
  const btnFreePass = document.getElementById("btn-free-pass");
  const ownerPanel = document.getElementById("owner-panel");
  const ownerPass = document.getElementById("owner-pass");
  const btnOwnerLogin = document.getElementById("btn-owner-login");
  const title = document.getElementById("title");

  const PAY_FALLBACK = T.en;

  let stream = null;
  let facing = "user";
  let scanning = false;
  let lang = "it";

  function detectLang() {
    const saved = localStorage.getItem(LS_LANG);
    if (saved && T[saved]) return saved;
    const nav = (navigator.language || "it").slice(0, 2).toLowerCase();
    return T[nav] ? nav : "it";
  }

  function t() { return T[lang] || T.it; }

  function txt(key) {
    const s = t();
    return s[key] != null ? s[key] : PAY_FALLBACK[key];
  }

  function isOwner() {
    return (
      localStorage.getItem(LS_OWNER) === "1" ||
      (window.MyFirstAppEarnings && MyFirstAppEarnings.isCreator())
    );
  }

  function paintOwnerEarnings() {
    const box = document.getElementById("owner-earnings");
    if (!window.MyFirstAppEarnings || !isOwner()) {
      box.style.display = "none";
      return;
    }
    const data = MyFirstAppEarnings.load();
    box.style.display = "block";
    document.getElementById("owner-earn-total").textContent = MyFirstAppEarnings.formatChf(data.totalChf);
    document.getElementById("owner-earn-count").textContent = data.count + " pagament" + (data.count === 1 ? "o" : "i");
  }

  function hasFreePass() {
    return localStorage.getItem(LS_FREE) === "1";
  }

  function hasPaid() {
    return localStorage.getItem(LS_PAID) === "1";
  }

  function canSeeTruth() {
    return isOwner() || hasFreePass() || hasPaid();
  }

  function setupPayment() {
    const price = CONFIG.PRICE + " " + CONFIG.CURRENCY + " (franchi)";
    document.getElementById("price-label").textContent = price;
    if (CONFIG.PAYPAL_USERNAME) {
      btnPay.href =
        "https://paypal.me/" +
        encodeURIComponent(CONFIG.PAYPAL_USERNAME) +
        "/" +
        CONFIG.PRICE;
    } else {
      btnPay.href = "#";
    }
  }

  function buildLangSelect() {
    langSelect.innerHTML = "";
    LANG_META.forEach((m) => {
      const opt = document.createElement("option");
      opt.value = m.code;
      opt.textContent = m.label;
      langSelect.appendChild(opt);
    });
    langSelect.value = lang;
  }

  function applyUI() {
    const s = t();
    document.documentElement.lang = lang;
    document.title = s.title.replace(/^💪\s*/, "");
    title.textContent = s.title;
    document.getElementById("intro").textContent = s.intro;
    document.getElementById("lang-label").textContent = s.langLabel;
    document.getElementById("guide-label").textContent = s.guide;
    btnScan.textContent = s.scan;
    btnFlip.textContent = s.flip;
    btnRetry.textContent = s.retry;
    document.getElementById("nav-back").textContent = s.back;
    document.getElementById("owner-title").textContent = s.ownerTitle;
    ownerPass.placeholder = s.ownerPass;
    btnOwnerLogin.textContent = s.ownerLogin;
    document.getElementById("owner-hint").textContent = s.ownerHint;
    guestNote.textContent = txt("guestNote");
    document.getElementById("pay-title").textContent = txt("payTitle");
    document.getElementById("pay-desc").textContent = txt("payDesc");
    btnPay.textContent = txt("payBtn");
    btnPaidDone.textContent = txt("paidDone");
    document.getElementById("pay-or").textContent = txt("payOr");
    freePassInput.placeholder = txt("freePassPh");
    btnFreePass.textContent = txt("freePassBtn");
    document.getElementById("pay-hint").textContent = txt("payHint");
    updateModeBadge();
    document.body.dir = (lang === "ar" || lang === "he") ? "rtl" : "ltr";
  }

  function updateModeBadge() {
    if (isOwner()) {
      modeBadge.textContent = txt("badgeOwner");
      modeBadge.className = "badge owner";
      guestNote.classList.remove("on");
      paywall.classList.remove("on");
    } else if (hasFreePass()) {
      modeBadge.textContent = txt("badgeFree");
      modeBadge.className = "badge free";
      guestNote.classList.remove("on");
      paywall.classList.remove("on");
    } else if (hasPaid()) {
      modeBadge.textContent = txt("badgePaid");
      modeBadge.className = "badge paid";
      guestNote.classList.remove("on");
      paywall.classList.remove("on");
    } else {
      modeBadge.textContent = txt("badgeGuest");
      modeBadge.className = "badge guest";
      guestNote.classList.add("on");
      paywall.classList.add("on");
    }
  }

  function showErr(text, ok) {
    errBox.textContent = text;
    errBox.classList.add("on");
    errBox.classList.toggle("ok", !!ok);
  }

  function hideErr() {
    errBox.classList.remove("on", "ok");
    errBox.textContent = "";
  }

  function stopStream() {
    if (stream) {
      stream.getTracks().forEach((tr) => tr.stop());
      stream = null;
    }
  }

  async function startCamera() {
    hideErr();
    stopStream();
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: facing, width: { ideal: 720 }, height: { ideal: 960 } },
        audio: false,
      });
      video.srcObject = stream;
      await video.play();
    } catch (e) {
      showErr(t().errCamera);
    }
  }

  function isSkinLike(r, g, b) {
    if (r < 60 || g < 30 || b < 20) return false;
    return (r - g) > 8 && (g - b) > 2 && r > b && r < 245 && (r + g) > b * 2.1;
  }

  function analyzeFrameTruth() {
    const w = preview.width;
    const h = preview.height;
    ctx.drawImage(video, 0, 0, w, h);
    const data = ctx.getImageData(0, 0, w, h).data;
    const cx = w * 0.5, cy = h * 0.5, rx = w * 0.31, ry = h * 0.24;
    let skin = 0, total = 0, warmSum = 0, brightSum = 0;

    for (let y = Math.floor(cy - ry); y < cy + ry; y += 2) {
      for (let x = Math.floor(cx - rx); x < cx + rx; x += 2) {
        const nx = (x - cx) / rx, ny = (y - cy) / ry;
        if (nx * nx + ny * ny > 1) continue;
        const i = (y * w + x) * 4;
        const r = data[i], g = data[i + 1], b = data[i + 2];
        total++;
        brightSum += (r + g + b) / 3;
        if (isSkinLike(r, g, b)) { skin++; warmSum += r - b; }
      }
    }

    const coverage = total ? skin / total : 0;
    const warmth = skin ? warmSum / skin : 0;
    const brightness = total ? brightSum / total : 0;
    let power = Math.floor(coverage * 180000 + warmth * 420 + Math.max(0, brightness - 90) * 180 + Math.random() * 1800);
    if (coverage < 0.04) power = Math.floor(200 + Math.random() * 800);
    else if (coverage < 0.1) power = Math.floor(power * 0.45);
    power = Math.max(80, Math.min(999999, power));
    return { power, coverage, truth: true };
  }

  function analyzeFrameFake() {
    const silly = [7, 42, 69, 404, 1337, 9999, 12345, 3, 100, 888888];
    const fakeList = t().fake;
    return {
      power: silly[Math.floor(Math.random() * silly.length)],
      coverage: 0,
      truth: false,
      fakeRank: fakeList[Math.floor(Math.random() * fakeList.length)],
    };
  }

  function pickRank(power) {
    const ranks = t().ranks;
    let rank = ranks[0];
    for (const r of ranks) if (power >= r.min) rank = r;
    return rank;
  }

  function localeForLang() {
    const map = { it: "it-IT", en: "en-US", de: "de-DE", fr: "fr-FR", es: "es-ES", pt: "pt-PT", ar: "ar-SA", zh: "zh-CN", ja: "ja-JP", ko: "ko-KR", ru: "ru-RU", pl: "pl-PL", hi: "hi-IN", tr: "tr-TR" };
    return map[lang] || "en-US";
  }

  function showResult(data) {
    const s = t();
    const truth = data.truth;
    resultTag.textContent = truth ? s.tagTruth : s.tagBluff;
    resultTag.className = "tag " + (truth ? "truth" : "bluff");
    result.classList.toggle("fake", !truth);

    if (truth) {
      const rank = pickRank(data.power);
      rankEl.textContent = rank.title;
      powerEl.textContent = data.power.toLocaleString(localeForLang());
      msgEl.textContent = data.coverage < 0.06 ? s.errLowCoverage : rank.msg;
    } else {
      rankEl.textContent = data.fakeRank.title;
      powerEl.textContent = data.power.toLocaleString(localeForLang());
      msgEl.textContent = data.fakeRank.msg;
    }

    const pct = Math.min(100, (Math.log10(data.power + 1) / Math.log10(999999)) * 100);
    meterFill.style.width = pct.toFixed(1) + "%";
    result.classList.add("on");
    if (!truth && !canSeeTruth()) paywall.classList.add("on");
  }

  async function scan() {
    if (scanning || !stream) return;
    scanning = true;
    btnScan.disabled = true;
    hideErr();
    scanLine.classList.add("on");
    await new Promise((r) => setTimeout(r, 1500));
    showResult(canSeeTruth() ? analyzeFrameTruth() : analyzeFrameFake());
    scanLine.classList.remove("on");
    scanning = false;
    btnScan.disabled = false;
  }

  function tryOwnerLogin() {
    const ok =
      ownerPass.value === CONFIG.OWNER_SECRET ||
      (window.MyFirstAppEarnings && MyFirstAppEarnings.loginCreator(ownerPass.value));
    if (ok) {
      localStorage.setItem(LS_OWNER, "1");
      ownerPanel.classList.remove("on");
      ownerPass.value = "";
      updateModeBadge();
      paintOwnerEarnings();
      showErr(t().errOwnerOk, true);
    } else {
      showErr(t().errOwnerWrong);
    }
  }

  function tryFreePass() {
    if (freePassInput.value === CONFIG.FREE_PASSWORD) {
      localStorage.setItem(LS_FREE, "1");
      freePassInput.value = "";
      updateModeBadge();
      showErr(txt("errFreeOk"), true);
    } else {
      showErr(txt("errFreeWrong"));
    }
  }

  function tryPaidDone() {
    localStorage.setItem(LS_PAID, "1");
    if (window.MyFirstAppEarnings) {
      MyFirstAppEarnings.recordPayment("Potenza Pancia", CONFIG.PRICE);
    }
    updateModeBadge();
    paintOwnerEarnings();
    showErr(txt("errPaidOk"), true);
  }

  let pressTimer = null;
  title.addEventListener("pointerdown", () => {
    pressTimer = setTimeout(() => {
      ownerPanel.classList.toggle("on");
      if (ownerPanel.classList.contains("on")) paintOwnerEarnings();
    }, 2000);
  });
  title.addEventListener("pointerup", () => clearTimeout(pressTimer));
  title.addEventListener("pointerleave", () => clearTimeout(pressTimer));

  langSelect.addEventListener("change", () => {
    lang = langSelect.value;
    localStorage.setItem(LS_LANG, lang);
    applyUI();
  });

  btnScan.addEventListener("click", scan);
  btnFlip.addEventListener("click", () => { facing = facing === "user" ? "environment" : "user"; startCamera(); });
  btnRetry.addEventListener("click", () => {
    result.classList.remove("on");
    startCamera();
  });
  btnOwnerLogin.addEventListener("click", tryOwnerLogin);
  btnFreePass.addEventListener("click", tryFreePass);
  btnPaidDone.addEventListener("click", tryPaidDone);
  ownerPass.addEventListener("keydown", (e) => { if (e.key === "Enter") tryOwnerLogin(); });
  freePassInput.addEventListener("keydown", (e) => { if (e.key === "Enter") tryFreePass(); });

  lang = detectLang();
  buildLangSelect();
  setupPayment();
  applyUI();
  paintOwnerEarnings();

  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    showErr(t().errNoCamera);
  } else {
    startCamera();
  }

  window.addEventListener("pagehide", stopStream);
})();
