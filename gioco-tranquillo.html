<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Laghetto tranquillo</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #0f1419 0%, #1a2332 45%, #243044 100%);
      color: #c8d6e5;
      padding: 0.75rem;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    h1 {
      font-size: 1.25rem;
      font-weight: 700;
      margin: 0 0 0.35rem;
      letter-spacing: 0.02em;
      color: #e8eef5;
    }
    p.intro {
      text-align: center;
      font-size: 0.84rem;
      color: #8fa3b8;
      max-width: 460px;
      margin: 0 0 0.65rem;
      line-height: 1.45;
    }
    #wrap {
      width: 100%;
      max-width: 820px;
      border-radius: 16px;
      overflow: hidden;
      box-shadow:
        0 20px 50px rgba(0, 0, 0, 0.45),
        inset 0 0 0 1px rgba(255, 255, 255, 0.06);
    }
    canvas {
      display: block;
      width: 100%;
      height: auto;
      vertical-align: middle;
      touch-action: none;
      cursor: crosshair;
    }
    nav {
      margin-top: 1rem;
      font-size: 0.82rem;
    }
    nav a {
      color: #74c0fc;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <h1>Laghetto tranquillo</h1>
  <p class="intro">
    Nessun punteggio, nessuna fretta. <strong>Clic</strong> o <strong>tocco</strong> sull’acqua per onde leggere.
    I pesci nuotano da soli. Respira e guarda.
  </p>
  <div id="wrap">
    <canvas id="cv" width="800" height="460" aria-label="Laghetto tranquillo"></canvas>
  </div>
  <nav><a href="entra.html">← Entra</a></nav>

  <script>
    const CV_W = 800;
    const CV_H = 460;
    const waterY = 115;

    let tick = 0;
    let ripples = [];
    let fish = [];
    let pads = [];
    let sparkles = [];

    let audioCtx = null;
    let ambientOn = false;

    function ensureAudio() {
      if (audioCtx) return;
      try {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      } catch (_) {}
    }

    function playSoftChime() {
      ensureAudio();
      if (!audioCtx) return;
      try {
        audioCtx.resume();
      } catch (_) {}
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.type = "sine";
      o.frequency.value = 392 + Math.random() * 80;
      const t0 = audioCtx.currentTime;
      g.gain.setValueAtTime(0.0001, t0);
      g.gain.linearRampToValueAtTime(0.045, t0 + 0.05);
      g.gain.exponentialRampToValueAtTime(0.0001, t0 + 1.4);
      o.connect(g);
      g.connect(audioCtx.destination);
      o.start(t0);
      o.stop(t0 + 1.45);
    }

    function startAmbientPad() {
      if (ambientOn || !audioCtx) return;
      ambientOn = true;
      const master = audioCtx.createGain();
      master.gain.value = 0.028;
      master.connect(audioCtx.destination);
      const freqs = [130.81, 164.81, 196.0];
      freqs.forEach((f, i) => {
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.type = "sine";
        o.frequency.value = f;
        g.gain.value = 0.35 / (i + 1);
        o.connect(g);
        g.connect(master);
        o.start();
      });
    }

    function initPads() {
      pads = [];
      for (let i = 0; i < 7; i++) {
        pads.push({
          x: 80 + Math.random() * (CV_W - 160),
          y: waterY + 55 + Math.random() * (CV_H - waterY - 120),
          r: 18 + Math.random() * 22,
          phase: Math.random() * Math.PI * 2,
          drift: 0.15 + Math.random() * 0.12,
        });
      }
    }

    function initFish() {
      fish = [];
      const colors = ["#5c7cfa", "#69db7c", "#ffd43b", "#ff8787"];
      for (let i = 0; i < 5; i++) {
        fish.push({
          x: Math.random() * CV_W,
          y: waterY + 90 + Math.random() * (CV_H - waterY - 140),
          vx: (Math.random() > 0.5 ? 1 : -1) * (0.35 + Math.random() * 0.45),
          phase: Math.random() * Math.PI * 2,
          wobble: 0.6 + Math.random() * 0.5,
          hue: colors[i % colors.length],
          len: 36 + Math.random() * 14,
        });
      }
    }

    function initSparkles() {
      sparkles = [];
      for (let i = 0; i < 28; i++) {
        sparkles.push({
          x: Math.random() * CV_W,
          y: waterY + 40 + Math.random() * (CV_H - waterY - 50),
          r: 0.6 + Math.random() * 1.8,
          tw: 0.02 + Math.random() * 0.04,
          ph: Math.random() * Math.PI * 2,
        });
      }
    }

    function addRipple(wx, wy) {
      if (wy < waterY + 20) return;
      ripples.push({ x: wx, y: wy, t: 0, maxT: 220 });
      if (ripples.length > 28) ripples.shift();
    }

    function drawSky(ctx) {
      const g = ctx.createLinearGradient(0, 0, 0, waterY + 30);
      g.addColorStop(0, "#1e3a5f");
      g.addColorStop(0.55, "#3d5a80");
      g.addColorStop(1, "#6b8cae");
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, CV_W, waterY + 35);

      ctx.fillStyle = "rgba(255, 248, 220, 0.55)";
      ctx.beginPath();
      ctx.arc(CV_W * 0.72 + Math.sin(tick * 0.0004) * 8, 62 + Math.cos(tick * 0.00035) * 5, 38, 0, Math.PI * 2);
      ctx.fill();

      for (let i = 0; i < 18; i++) {
        const sx = ((i * 97 + tick * 0.012) % (CV_W + 120)) - 40;
        const sy = 28 + (i % 4) * 14 + Math.sin(i + tick * 0.001) * 6;
        ctx.fillStyle = `rgba(255,255,255,${0.06 + (i % 3) * 0.04})`;
        ctx.beginPath();
        ctx.ellipse(sx, sy, 42 + i * 2, 11 + (i % 2) * 4, 0, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function drawWater(ctx) {
      const g = ctx.createLinearGradient(0, waterY, 0, CV_H);
      g.addColorStop(0, "#2d4a5e");
      g.addColorStop(0.35, "#1e3d4f");
      g.addColorStop(1, "#152a38");
      ctx.fillStyle = g;
      ctx.fillRect(0, waterY, CV_W, CV_H - waterY);

      const shimmer = Math.sin(tick * 0.0022) * 6;
      ctx.strokeStyle = "rgba(180, 220, 255, 0.08)";
      ctx.lineWidth = 1;
      for (let x = -20; x < CV_W + 40; x += 55) {
        ctx.beginPath();
        ctx.moveTo(x, waterY + 12 + shimmer);
        ctx.quadraticCurveTo(x + 28, waterY + 8 + shimmer * 0.5, x + 55, waterY + 14 + shimmer);
        ctx.stroke();
      }
    }

    function drawPads(ctx) {
      for (const p of pads) {
        const bob = Math.sin(tick * 0.0018 + p.phase) * 2.5;
        ctx.fillStyle = "rgba(45, 95, 68, 0.85)";
        ctx.beginPath();
        ctx.ellipse(p.x + Math.sin(tick * p.drift) * 4, p.y + bob, p.r, p.r * 0.42, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = "rgba(120, 200, 150, 0.35)";
        ctx.lineWidth = 1;
        ctx.stroke();
        ctx.strokeStyle = "rgba(255,255,255,0.12)";
        ctx.beginPath();
        ctx.moveTo(p.x - p.r * 0.35, p.y + bob);
        ctx.lineTo(p.x + p.r * 0.35, p.y + bob);
        ctx.stroke();
      }
    }

    function drawRipples(ctx) {
      ripples = ripples.filter((r) => {
        r.t += 1;
        const u = r.t / r.maxT;
        if (u >= 1) return false;
        const rad = 12 + u * 140;
        const a = (1 - u) * 0.42;
        ctx.strokeStyle = `rgba(180, 230, 255, ${a})`;
        ctx.lineWidth = 2 - u * 1.2;
        ctx.beginPath();
        ctx.arc(r.x, r.y, rad, 0, Math.PI * 2);
        ctx.stroke();
        ctx.strokeStyle = `rgba(255, 255, 255, ${a * 0.35})`;
        ctx.beginPath();
        ctx.arc(r.x, r.y, rad * 0.72, 0, Math.PI * 2);
        ctx.stroke();
        return true;
      });
    }

    function drawFish(ctx) {
      for (const f of fish) {
        f.x += f.vx;
        f.phase += 0.028 * f.wobble;
        const wy = f.y + Math.sin(f.phase) * 14;
        if (f.x > CV_W + 80) f.x = -60;
        if (f.x < -80) f.x = CV_W + 60;

        ctx.save();
        ctx.translate(f.x, wy);
        ctx.scale(Math.sign(f.vx) || 1, 1);
        const body = ctx.createLinearGradient(-f.len / 2, 0, f.len / 2, 0);
        body.addColorStop(0, f.hue);
        body.addColorStop(0.5, "#ffffff55");
        body.addColorStop(1, f.hue);
        ctx.fillStyle = body;
        ctx.beginPath();
        ctx.ellipse(0, 0, f.len * 0.45, 11, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "rgba(0,0,0,0.35)";
        ctx.beginPath();
        ctx.arc(-f.len * 0.28, -3, 3.5, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = "rgba(255,255,255,0.25)";
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(-f.len * 0.42, 0);
        ctx.lineTo(-f.len * 0.62, -8);
        ctx.lineTo(-f.len * 0.62, 8);
        ctx.closePath();
        ctx.fillStyle = f.hue;
        ctx.fill();
        ctx.stroke();
        ctx.restore();
      }
    }

    function drawSparkles(ctx) {
      for (const s of sparkles) {
        const a = 0.15 + Math.sin(tick * s.tw + s.ph) * 0.12;
        ctx.fillStyle = `rgba(255, 250, 220, ${Math.max(0.05, a)})`;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function loop() {
      tick++;
      const canvas = document.getElementById("cv");
      const ctx = canvas.getContext("2d");
      ctx.clearRect(0, 0, CV_W, CV_H);

      drawSky(ctx);
      drawWater(ctx);
      drawSparkles(ctx);
      drawPads(ctx);
      drawRipples(ctx);
      drawFish(ctx);

      requestAnimationFrame(loop);
    }

    function pointerPos(e, canvas) {
      const r = canvas.getBoundingClientRect();
      const sx = canvas.width / r.width;
      const sy = canvas.height / r.height;
      const cx = (e.clientX != null ? e.clientX : e.touches[0].clientX) - r.left;
      const cy = (e.clientY != null ? e.clientY : e.touches[0].clientY) - r.top;
      return { x: cx * sx, y: cy * sy };
    }

    const canvas = document.getElementById("cv");

    canvas.addEventListener(
      "pointerdown",
      (e) => {
        e.preventDefault();
        ensureAudio();
        try {
          audioCtx.resume();
        } catch (_) {}
        const { x, y } = pointerPos(e, canvas);
        addRipple(x, y);
        playSoftChime();
        startAmbientPad();
      },
      { passive: false }
    );

    initPads();
    initFish();
    initSparkles();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
